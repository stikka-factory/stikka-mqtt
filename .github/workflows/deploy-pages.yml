name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let in-flight runs finish rather than
# racing a half-deployed site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # frontend/public/config.json and frontend/public/fonts/ are gitignored
      # (per-deployment/local state, see .gitignore) so a fresh checkout has
      # neither. Recreate the minimal versions the build needs.
      #
      # mqtt.brokerURL must never be empty here: mqtt-api.ts's initTransport()
      # throws synchronously on a falsy brokerURL, which happens before the
      # app renders anything, so there's no Settings UI left to fix it from.
      # The 'ws://localhost:9001' fallback is just a syntactically valid
      # placeholder (matches the local dev stack) - set the MQTT_BROKER_URL
      # repo variable to your real broker for an actually working deploy.
      - name: Write MQTT config.json
        working-directory: frontend/public
        env:
          MQTT_BROKER_URL: ${{ vars.MQTT_BROKER_URL || 'ws://localhost:9001' }}
          MQTT_USERNAME: ${{ vars.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          MQTT_CLIENT_ID_PREFIX: ${{ vars.MQTT_CLIENT_ID_PREFIX || 'stikka-web' }}
          MQTT_DISCOVERY_WAIT_MS: ${{ vars.MQTT_DISCOVERY_WAIT_MS || '1500' }}
          MQTT_SETTINGS_PASSWORD: ${{ secrets.MQTT_SETTINGS_PASSWORD || 'changeme' }}
          APP_NAME: ${{ vars.APP_NAME || 'Stikka-MQTT' }}
          APP_SUBTITLE: ${{ vars.APP_SUBTITLE || 'Kleben und kleben lassen, IoT-Style' }}
          # These two are left unset here (rather than defaulted via `||`)
          # because they're multi-line ZPL -- a GH Actions expression string
          # literal can't cleanly hold embedded newlines. Their defaults are
          # applied below as bash heredocs instead, only when empty.
          APP_ZPL_EXAMPLE: ${{ vars.APP_ZPL_EXAMPLE }}
          APP_CABLE_LABEL_ZPL_TEMPLATE: ${{ vars.APP_CABLE_LABEL_ZPL_TEMPLATE }}
          # Must be exactly "true" or "false" -- passed straight to jq --argjson,
          # which errors the build on anything else (fail fast, not silently wrong).
          APP_ZPL_RAW_ENABLED: ${{ vars.APP_ZPL_RAW_ENABLED || 'true' }}
          APP_CABLE_LABEL_ENABLED: ${{ vars.APP_CABLE_LABEL_ENABLED || 'true' }}
        run: |
          # NB: this file is served as a public static asset once deployed -
          # anyone can view it, so treat everything below as non-secret even
          # though the values are sourced from Actions vars/secrets here.
          #
          # This is the bootstrap config every browser starts from; the
          # Settings tab can retune all of it (including mqtt.*) at runtime
          # without a redeploy, published retained to the broker so it
          # applies globally (see initTransport() in mqtt-api.ts) -- but the
          # values here are what a brand-new visitor (or a broker that's
          # since gone stale) falls back to, so keep them in sync with
          # whatever's actually live if you want a redeploy to not regress
          # runtime changes.
          # $'...' (ANSI-C quoting) turns the \n escapes into real newlines
          # without needing a heredoc -- a heredoc body isn't indented like
          # the rest of this block-scalar `run: |` step, so it reads as
          # broken YAML structure rather than shell content.
          APP_ZPL_EXAMPLE=${APP_ZPL_EXAMPLE:-$'^XA\n^CFA,30\n^FO50,20\n^FDSTikka ZPL Test^FS\n\n^FO50,40\n^BQN,2,3,Q,7\n^FD1234125678^FS\n\n^FO50,120\n^BCN,45,Y,N,N,A\n^FD1234125678^FS\n\n^XZ'}
          APP_CABLE_LABEL_ZPL_TEMPLATE=${APP_CABLE_LABEL_ZPL_TEMPLATE:-$'^XA\n^FO35,365^AAB,30^FD$input1$^FS\n^FO75,365^AAB,30^FD$input2$^FS\n\n^FO120,365^AAR,30^FD$input2$^FS\n^FO160,365^AAR,30^FD$input1$^FS\n^XZ'}

          jq -n \
            --arg brokerURL "$MQTT_BROKER_URL" \
            --arg username "$MQTT_USERNAME" \
            --arg password "$MQTT_PASSWORD" \
            --arg clientIdPrefix "$MQTT_CLIENT_ID_PREFIX" \
            --argjson discoveryWaitMs "$MQTT_DISCOVERY_WAIT_MS" \
            --arg settingsPassword "$MQTT_SETTINGS_PASSWORD" \
            --arg appName "$APP_NAME" \
            --arg appSubtitle "$APP_SUBTITLE" \
            --arg zplExample "$APP_ZPL_EXAMPLE" \
            --argjson zplRawEnabled "$APP_ZPL_RAW_ENABLED" \
            --arg cableLabelZPLTemplate "$APP_CABLE_LABEL_ZPL_TEMPLATE" \
            --argjson cableLabelEnabled "$APP_CABLE_LABEL_ENABLED" \
            '{
              mode: "mqtt",
              app: {
                name: $appName,
                subtitle: $appSubtitle,
                zplExample: $zplExample,
                zplRawEnabled: $zplRawEnabled,
                cableLabelZPLTemplate: $cableLabelZPLTemplate,
                cableLabelEnabled: $cableLabelEnabled
              },
              mqtt: {
                brokerURL: $brokerURL,
                username: $username,
                password: $password,
                clientIdPrefix: $clientIdPrefix,
                discoveryWaitMs: $discoveryWaitMs
              },
              mqttSettingsPassword: $settingsPassword
            }' > config.json

      - name: Ensure fonts directory exists
        run: mkdir -p frontend/public/fonts

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

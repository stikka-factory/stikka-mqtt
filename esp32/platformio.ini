; Env naming convention: <board>_<protocol>_<method>
;
; - protocol = what's inside the payload the firmware relays (today: "zpl",
;   meaning ZPL text or pre-rendered image bytes, forwarded byte-for-byte
;   without being parsed -- see src/mqtt_bridge.cpp).
; - method   = how the firmware reaches the printer (today: "network", a
;   plain TCP connection -- see src/targets/network_target.cpp).
;
; Every env below builds the same "zpl" protocol over the same "network"
; method; only the target board changes. A future protocol/method
; combination (e.g. a USB-attached Brother QL/Seiko SLP driver) gets its own
; src/targets/*.cpp implementing the same send-bytes contract, plus its own
; <board>_<protocol>_<method> envs here -- each env is a distinct firmware
; build, not a runtime option.
[platformio]
default_envs = m5stack-atom_zpl_network

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.4
  adafruit/Adafruit NeoPixel@^1.12.3

build_flags =
  -D CORE_DEBUG_LEVEL=1
  -D DEFAULT_MQTT_HOST='"fb750433694544efa82d452638dea659.s1.eu.hivemq.cloud"'
  -D DEFAULT_MQTT_PORT=8883
  -D DEFAULT_MQTT_USE_TLS=true
  -D DEFAULT_MQTT_TLS_INSECURE=true
  -D DEFAULT_MQTT_USER='"stikka"'
  -D DEFAULT_MQTT_PASSWORD='"stikka123"'

[env:esp32dev_zpl_network]
board = esp32dev

[env:esp32doit-devkit-v1_zpl_network]
board = esp32doit-devkit-v1

[env:nodemcu-32s_zpl_network]
board = nodemcu-32s

[env:wemos_d1_mini32_zpl_network]
board = wemos_d1_mini32

[env:lolin32_zpl_network]
board = lolin32

[env:lolin_d32_zpl_network]
board = lolin_d32

[env:featheresp32_zpl_network]
board = featheresp32

[env:tinypico_zpl_network]
board = tinypico

[env:m5stack-core-esp32_zpl_network]
board = m5stack-core-esp32

[env:m5stack-fire_zpl_network]
board = m5stack-fire

[env:m5stack-atom_zpl_network]
board = m5stack-atom
build_flags =
  ${env.build_flags}
  -D DEFAULT_LED_MODE='"neopixel"'
  -D DEFAULT_LED_PIN=27
  -D DEFAULT_LED_ORDER='"GRB"'

[env:heltec_wifi_kit_32_zpl_network]
board = heltec_wifi_kit_32

[env:esp32-s2-saola-1_zpl_network]
board = esp32-s2-saola-1

[env:esp32-c3-devkitm-1_zpl_network]
board = esp32-c3-devkitm-1

[env:esp32-s3-devkitc-1_zpl_network]
board = esp32-s3-devkitc-1
